name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  frontend:
    name: Frontend build and lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Guard against committed env secrets
        run: |
          tracked_envs=$(git ls-files | grep -E '(^|/)\.env($|\.production$|\.development$|\.local$)' | grep -v '\.example$' || true)
          if [ -n "$tracked_envs" ]; then
            echo "Found tracked environment files:"
            echo "$tracked_envs"
            exit 1
          fi

      - name: Build frontend
        run: npm run build

      - name: Lint frontend
        run: npm run lint

  backend:
    name: Backend tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install backend dependencies
        run: |
          python -m pip install -r backend/requirements.txt
          python -m pip install pytest

      - name: Guard against committed env secrets
        run: |
          tracked_envs=$(git ls-files | grep -E '(^|/)\.env($|\.production$|\.development$|\.local$)' | grep -v '\.example$' || true)
          if [ -n "$tracked_envs" ]; then
            echo "Found tracked environment files:"
            echo "$tracked_envs"
            exit 1
          fi

      - name: Compile backend package
        run: python -m compileall backend/app

      - name: Run backend tests
        env:
          PYTHONPATH: backend
          DATABASE_BACKEND: sqlite
          DATABASE_URL: sqlite:///./ci.db
          PROJECTS_WORKSPACE_PATH: ./projects
          LLM_PROVIDER: ollama
          AI_PROVIDER: ollama
          GROQ_API_KEY: ""
          OPENAI_API_KEY: ""
          GEMINI_API_KEY: ""
        run: |
          pytest -q backend/tests
