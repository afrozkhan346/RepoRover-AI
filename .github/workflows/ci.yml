name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  frontend:
    name: Frontend build and lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Lint frontend
        run: npm run lint

  backend:
    name: Backend syntax and config smoke check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install backend smoke-test dependencies
        run: python -m pip install pydantic pydantic-settings

      - name: Compile backend package
        run: python -m compileall backend/app

      - name: Smoke test backend config
        run: |
          python - <<'PY'
          import sys
          sys.path.insert(0, 'backend')
          from app.core.config import settings
          print(settings.app_name)
          print(settings.resolved_database_backend)
          PY
