services:
  - name: repo-rover-backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.13"
      - key: ENVIRONMENT
        value: production
      - key: DATABASE_BACKEND
        value: postgresql
      # DATABASE_URL - Set in Render dashboard (from Supabase)
      # GROQ_API_KEY - Set in Render dashboard
      # LLM_PROVIDER=groq
    rootDir: backend
